name: Release Lumograph

on:
  push:
    tags:
      - 'v*' # Trigger on tag push matching v*, i.e. v1.0.0

permissions:
  contents: write # Required to publish a GitHub Release

jobs:
  build-and-release:
    name: Build and Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Full history + tags so we can build a changelog

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'
          cache: true

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v9
        with:
          version: v2.12.2
          args: --timeout=5m

      - name: Run go generate
        run: |
          echo "Generating graphs.go from latest upstream PMM..."
          go generate ./...

      - name: Build Binaries
        run: |
          mkdir -p dist
          echo "Building Linux (amd64)..."
          GOOS=linux GOARCH=amd64 go build -ldflags="-X 'main.Version=${GITHUB_REF_NAME}'" -o dist/lumograph-linux-amd64 .

          echo "Building macOS (arm64/Apple Silicon)..."
          GOOS=darwin GOARCH=arm64 go build -ldflags="-X 'main.Version=${GITHUB_REF_NAME}'" -o dist/lumograph-darwin-arm64 .

      - name: Generate Changelog
        id: changelog
        run: |
          CURRENT_TAG="${GITHUB_REF_NAME}"

          # Most recent tag reachable before the current one (empty for first release)
          PREVIOUS_TAG=$(git describe --tags --abbrev=0 "${CURRENT_TAG}^" 2>/dev/null || echo "")

          if [ -z "${PREVIOUS_TAG}" ]; then
            echo "No previous tag found; including full history."
            RANGE="${CURRENT_TAG}"
          else
            echo "Building changelog for ${PREVIOUS_TAG}..${CURRENT_TAG}"
            RANGE="${PREVIOUS_TAG}..${CURRENT_TAG}"
          fi

          {
            echo "changelog<<CHANGELOG_EOF"
            echo "## What's Changed"
            echo ""
            git log --no-merges --pretty=format:'- %s (%h)' "${RANGE}"
            echo ""
            if [ -n "${PREVIOUS_TAG}" ]; then
              echo ""
              echo "**Full Changelog**: https://github.com/${GITHUB_REPOSITORY}/compare/${PREVIOUS_TAG}...${CURRENT_TAG}"
            fi
            echo "CHANGELOG_EOF"
          } >> "${GITHUB_OUTPUT}"

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          body: ${{ steps.changelog.outputs.changelog }}
          fail_on_unmatched_files: true
