name: Release Lumograph

on:
  push:
    tags:
      - 'v*' # Trigger on tag push matching v*, i.e. v1.0.0

permissions:
  contents: write # Required to publish a GitHub Release

jobs:
  build-and-release:
    name: Build and Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.x'
          cache: true

      - name: Run golangci-lint
        uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          args: --timeout=5m

      - name: Run go generate
        run: |
          echo "Generating graphs.go from latest upstream PMM..."
          go generate ./...

      - name: Build Binaries
        run: |
          mkdir -p dist
          echo "Building Linux (amd64)..."
          GOOS=linux GOARCH=amd64 go build -ldflags="-X 'main.Version=${GITHUB_REF_NAME}'" -o dist/lumograph-linux-amd64 .

          echo "Building macOS (amd64)..."
          GOOS=darwin GOARCH=amd64 go build -ldflags="-X 'main.Version=${GITHUB_REF_NAME}'" -o dist/lumograph-darwin-amd64 .

          echo "Building macOS (arm64/Apple Silicon)..."
          GOOS=darwin GOARCH=arm64 go build -ldflags="-X 'main.Version=${GITHUB_REF_NAME}'" -o dist/lumograph-darwin-arm64 .

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
          fail_on_unmatched_files: true
