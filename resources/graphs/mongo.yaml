dashboards:
  - name: MongoDB_Instance_Summary
    group: mongo
    graphs:
      - Command Operations
      - Latency Detail
      - Connections
      - Cursors
      - Document Operations
      - Queued Operations
      - Query Efficiency
      - Scanned and Moved Objects

  - name: MongoDB_WiredTiger_Details
    group: wiredtiger
    graphs:
      - WiredTiger Transactions
      - WiredTiger Cache Activity
      - WiredTiger Block Activity
      - WiredTiger Sessions
      - WiredTiger Concurrency Tickets Available
      - Queued Operations
      - WiredTiger Checkpoint Time
      - WiredTiger Cache Eviction
      - WiredTiger Cache Capacity
      - WiredTiger Cache Pages
      - WiredTiger Log Records
      - Document Changes
      - Scanned and Moved Objects
      - Page Faults

  - name: MongoDB_ReplSet_Summary
    group: replset
    graphs:
      - Operation Latencies
      - Reads & Writes
      - Average Connections
      - Replication Lag
      - Oplog Recovery Window
      - Flow Control
      - Oplog GB/Hour - $service_name

  - name: MongoDB_Cluster_Summary
    group: sharding
    graphs:
      - Command Operations
      - Operation Latencies
      - Operations Per Shard
      - Current Connections Per Shard
      - Available Connections
      - Dynamic of Chunks
      - Chunks Move Events
      - Chunks Split Events
      - Replication Lag by Shard
      - Oplog Range by Shard
      - Flow Control
      - Oplog GB/Hour - $service_name
